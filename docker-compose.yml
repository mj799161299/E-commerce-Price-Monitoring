name: price-monitor

services:
  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: price_monitor_db
    environment:
      POSTGRES_USER: price_monitor
      POSTGRES_PASSWORD: your_password_change_me
      POSTGRES_DB: price_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - price_monitor_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U price_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI后端
  backend:
    build: ./backend
    container_name: price_monitor_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://price_monitor:your_password_change_me@db:5432/price_monitor
      SECRET_KEY: your-secret-key-change-in-production-min-32-chars
      AES_KEY: your-aes-key-32-bytes-long-key!
      DEBUG: "False"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - price_monitor_network
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Vue前端
  frontend:
    build: ./frontend
    container_name: price_monitor_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - price_monitor_network
    restart: always

volumes:
  postgres_data:

networks:
  price_monitor_network:
    driver: bridge
